<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicUAM - Recuperar Contraseña</title>

    <link rel="stylesheet" href="../static/css/p1.css">
    <link rel="stylesheet" href="../static/css/login.css">
    
</head>

<body>

    <header class="netflix-navbar">
        <div class="logo">
            <img src="../static/img/logo.jpeg" alt="Logo de ComicUam">
        </div>
        <nav class="nav-links">
            <ul>
                <li><a href="../static/index.html">Inicio</a></li>
                <li><a href="#">Cómics</a></li>
                <li><a href="#">Novedades</a></li>
                <li><a href="#">Mi Lista</a></li>
                <li><a href="../static/login.html">Iniciar sesión</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container">
        <div class="login-page-wrapper">

        <section class="login-container">

            <!-- Título corregido y destacado -->
            <h1>Recuperar Contraseña</h1>

            <!-- Descripción corregida -->
            <p>Ingresa tus datos para recuperar la contraseña en ComicUAM.</p>

            <form action="#" method="post">

                <div class="input-group">
                    <label for="correo">Correo electrónico</label>
                    <input
                        type="email"
                        id="correo"
                        name="correo"
                        placeholder="Ingresa tu correo"
                        required>
                </div>

                <div class="input-group">
                    <label for="numero_tel">Número Telefónico</label>
                    <input
                        type="tel"
                        id="numero_tel"
                        name="numero_tel"
                        placeholder="Ingresa tu número telefónico"
                        required>
                </div>

                <div class="input-group">
                    <label for="ultim_pass">Última Contraseña</label>
                    <input
                        type="password"
                        id="ultim_pass"
                        name="ultim_pass"
                        placeholder="Ingresa la última que recuerdes"
                        required>
                </div>

                <!-- Botón de Envío Naranja Estilizado -->
                <button class="btn-login" type="submit">
                    Enviar Código de Recuperación
                </button>

            </form>

            <!-- Enlace Cancelar estilizado -->
            <div class="register-link">
                ¿Cancelar la recuperación? 
                <a href="../login/login.html">Cancelar</a>
            </div>

        </section>

        </div>
    </main>

</body>

</html>
