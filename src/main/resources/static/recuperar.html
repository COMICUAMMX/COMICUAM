<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicUAM - Iniciar Sesión</title>

    <link rel="stylesheet" href="../css/p1.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <header class="netflix-navbar">
        <div class="logo">
            <img src="../img/logo.jpeg" alt="Logo de ComicUam">
        </div>
        <nav class="nav-links">
            <ul>
                <li><a href="../index/index.html">Inicio</a></li>
                <li><a href="#">Cómics</a></li>
                <li><a href="#">Novedades</a></li>
                <li><a href="#">Mi Lista</a></li>
                <li><a href="login.html">Iniciar sesión</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container">

        <section class="login-container">

            <h1>Recuperar Conrtaseña</h1>

            <p>Ingresa los datos para recuperar ocntraseña ComicUAM.</p>

            <form action="#" method="post">

                <div class="input-group">

                    <label for="correo">Correo electrónico</label>

                    <input
                        type="email"
                        id="correo"
                        name="correo"
                        placeholder="Ingresa tu correo"
                        required>

                </div>


                <div class="input-group">

                    <label for="numero_telefonico">Número Telefonico</label>

                    <input
                        type="numero"
                        id="numero_tel"
                        name="numero_tel"
                        placeholder="Ingresa tu número telefonico"
                        required>
                </div>

                <div class="input-group">

                    <label for="Ultima_Contraseña">Ultima Contraseña</label>

                    <input
                        type="password"
                        id="ultim_pass"
                        name="ultim_pass"
                        placeholder="Ingresa la ultima password que recuerdes"
                        required>
                </div>



                <button class="btn-login" type="submit">
                    Enviar Codigo de Recuperación
                </button>

            </form>

            <div class="register-link">
                ¿Cancelar la Recuperación?
                <a href="../login/login.html">Cancelar</a>
            </div>

        </section>

    </main>

</body>

</html>
