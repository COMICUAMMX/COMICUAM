<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ComicUam</title>
    <link rel="stylesheet" href="../static/css/p1.css">
    
    <style>
        .netflix-navbar {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            padding: 15px 4% !important; 
            background: rgba(0, 0, 0, 0.9) !important; 
        }

        .nav-links ul {
            display: flex !important;
            align-items: center !important;
            margin: 0 !important;
            padding: 0 !important;
            list-style: none !important;
            gap: 20px !important; 
        }

        .nav-links a {
            font-size: 1.05rem !important;
            font-weight: 500 !important;
            color: #e5e5e5 !important;
            text-decoration: none !important;
            transition: color 0.3s ease, transform 0.2s ease !important;
            display: inline-block !important;
        }

        .nav-links a:hover {
            color: #ff6600 !important;
            transform: scale(1.05);
        }

        .nav-links ul li:last-child a {
            background-color: #ff6600 !important;
            color: white !important;
            padding: 7px 17px !important;
            border-radius: 4px !important;
            font-weight: 600 !important;
            box-shadow: 0 4px 10px rgba(255, 102, 0, 0.3) !important;
            transition: background 0.2s ease, transform 0.2s ease !important;
        }

        .nav-links ul li:last-child a:hover {
            background-color: #cc5200 !important; 
            transform: translateY(-1px) !important;
            color: white !important;
        }

        .register-section {
            background: rgba(0, 0, 0, 0.8) !important;
            padding: 40px 30px !important;
            border-radius: 8px !important;
            max-width: 450px !important;
            margin: 80px auto !important; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5) !important;
        }

        
        .register-section h2 {
            color: #ff6600 !important; 
            font-size: 2rem !important;
            font-weight: 700 !important;
            margin-bottom: 25px !important;
            text-align: center !important;
            letter-spacing: 0.5px !important;
        }

        /* Adaptación estructural para los contenedores de tus inputs */
        .form-group {
            display: flex !important;
            flex-direction: column !important;
            margin-bottom: 20px !important;
        }

        .form-group label {
            color: #e5e5e5 !important;
            margin-bottom: 8px !important;
            font-size: 0.9rem !important;
            font-weight: 500 !important;
        }

        .form-group input {
            background: #333 !important;
            border: 1px solid #444 !important;
            border-radius: 4px !important;
            color: white !important;
            padding: 12px !important;
            font-size: 1rem !important;
            transition: border-color 0.3s ease !important;
        }

        .form-group input:focus {
            border-color: #ff6600 !important;
            outline: none !important;
        }

        .btn.btn-primary {
            width: 100% !important;
            background-color: #ff6600 !important;
            color: white !important;
            border: none !important;
            padding: 14px !important;
            border-radius: 4px !important;
            font-size: 1.05rem !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            box-shadow: 0 4px 12px rgba(255, 102, 0, 0.4) !important;
            transition: background 0.2s ease, transform 0.2s ease !important;
            margin-top: 15px !important;
        }

        .btn.btn-primary:hover {
            background-color: #cc5200 !important;
            transform: translateY(-1px) !important;
        }

        .register-section p {
            margin-top: 25px !important;
            text-align: center !important;
            color: #a0a0a0 !important;
            font-size: 0.95rem !important;
        }

        .register-section p a {
            color: #ff6600 !important;
            text-decoration: none !important;
            font-weight: 600 !important;
            margin-left: 5px !important;
        }

        .register-section p a:hover {
            text-decoration: underline !important;
        }
    </style>
</head>
<body>

    <header class="netflix-navbar">
        <div class="logo">
            <img src="../static/img/logo.jpeg" alt="Logo de ComicUam">
        </div>
        <nav class="nav-links">
            <ul>
                <li><a href="../static/index.html">Inicio</a></li>
                <li><a href="#">Cómics</a></li>
                <li><a href="#">Novedades</a></li>
                <li><a href="#">Mi Lista</a></li>
                <li><a href="../static/login.html">Iniciar sesión</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container">
        <section class="register-section">
            <h2>Registro de Nuevo Usuario</h2>
            
            <form action="../php/register.php" method="POST" class="register-form">
                <div class="form-group">
                    <label for="username">Nombre de Usuario:</label>
                    <input type="text" id="username" name="username" placeholder="Crea tu nombre de usuario" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Ingresa tu correo" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="Crea una contraseña segura" required>
                </div>
                <button type="submit" class="btn btn-primary">Registrarse</button>
            </form>
            
            <p>¿Ya tienes cuenta? <a href="../static/login.html">Inicia sesión aquí</a>.</p>
        </section>
    </main>

</body>
</html>
