<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Cómics - ComicUAM</title>
    
    <!-- CORREGIDO: Rutas absolutas a los CSS (sin '../static') -->
    <link rel="stylesheet" href="/css/p1.css">
    <link rel="stylesheet" href="/css/lector.css">
</head>
<body>

    <!-- Barra de navegación superior fija -->
    <header class="netflix-navbar">
        <!-- CORREGIDO: Ajustado para usar la clase navbar-left igual que en el inicio -->
        <div class="navbar-left" style="display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0 4%;">
            <div class="logo">
                <!-- CORREGIDO: Ruta absoluta para el logo -->
                <img src="/img/logo.jpeg" alt="Logo de ComicUam" style="height: 40px;">
            </div>
            <ul class="nav-links" style="display: flex; list-style: none; gap: 20px;">
                <!-- CORREGIDO: Rutas absolutas al index.html -->
                <li><a href="/">Inicio</a></li>
                <li><a href="/#sec-destacados">Cómics</a></li>
                <li><a href="/#sec-novedades">Novedades</a></li>
                <li><a href="/#sec-milista">Mi Lista</a></li>
            </ul>
        </div>
    </header>

    <!-- Contenedor exclusivo del lector -->
    <main class="reader-container" style="padding-top: 100px;">
        
        <!-- Título del Cómic con ID limpio -->
        <h1 id="titulo-comic" style="text-align: center; color: #fff;">Cargando Cómic...</h1>

        <!-- Caja de Sinopsis Estilizada -->
        <div class="descripcion-box" style="max-width: 700px; margin: 20px auto; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 8px; color: #ccc;">
            <h3 style="color: #fff; margin-top: 0;">Sinopsis</h3>
            <p id="comic-descripcion">Cargando descripción del cómic...</p>
        </div>

        <!-- Visor de la página actual (PROPORCIÓN REPARADA Y LISTO PARA 3D) -->
        <div class="image-viewer" style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 20px;">
            
            <!-- Contenedor que hará el efecto de volteado -->
            <div class="page-container" id="comic-book-page" style="width: 100%; max-width: 700px; margin: 0 auto; display: block;">
                <img id="pagina-actual-img" src="" alt="Cargando página..." 
                     style="max-width: 100%; max-height: 80vh; width: auto; height: auto; object-fit: contain; display: block; margin: 0 auto; border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.8);">
            </div>
            
            <!-- Controles de navegación limpios -->
            <div class="controls" style="margin-top: 30px; display: flex; justify-content: center; align-items: center; gap: 40px;">
                <button id="btn-anterior" class="btn-nav" onclick="cambiarPagina(-1)">ANTERIOR</button>
                <span id="info-pagina" style="color: #ffffff; font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;">Página 1 de 24</span>
                <button id="btn-siguiente" class="btn-nav" onclick="cambiarPagina(1)">SIGUIENTE</button>
            </div>
        </div>

    </main>

    <!-- Script de control de lógica y efectos -->
    <script>
        // Variables globales para el estado del lector
        let paginaActual = 1;
        let totalPaginas = parseInt(localStorage.getItem('comicTotalPaginas')) || 24;
        let rutaCarpeta = localStorage.getItem('comicRutaCarpeta') || '';
        let prefijoArchivo = localStorage.getItem('comicPrefijo') || '';

        // Al cargar la página, inyectamos los textos guardados en el localStorage
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('titulo-comic').innerText = localStorage.getItem('comicTitulo') || 'Cómic';
            document.getElementById('comic-descripcion').innerText = localStorage.getItem('comicDescripcion') || 'Sin descripción disponible.';
            actualizarVisor();
        });

        // Función para cambiar de página con efecto 3D
        function cambiarPagina(direccion) {
            if (paginaActual + direccion < 1 || paginaActual + direccion > totalPaginas) return;

            const contenedorHoja = document.getElementById('comic-book-page');
            contenedorHoja.classList.add('volteando');

            setTimeout(() => {
                paginaActual += direccion;
                actualizarVisor(); 
                contenedorHoja.classList.remove('volteando');
            }, 250); 
        }

        // Función REPARADA basada en la estructura real de tus carpetas
        function actualizarVisor() {
            const imagenImg = document.getElementById('pagina-actual-img');
            let numeroFormateado = '';

            // CORRECCIÓN DE RUTAS: 
            // Como todo está metido en 'mi_Comicdescargado' (excepto hulk), forzamos esa ruta si no es Hulk.
            let rutaReal = rutaCarpeta;
            if (!rutaCarpeta.includes('hulk')) {
                rutaReal = '/assets/comics/mi_Comicdescargado';
            }

            // Identificamos el formato exacto del número de página según el cómic
            if (prefijoArchivo.includes('Batman-163')) {
                // Batman-163 tiene la pag 1 como "1.jpg" pero las siguientes podrían ser "0001", "0002" o "1", "2".
                // Probamos primero con formato simple (1, 2, 3...) que es como llamaron al primer archivo
                numeroFormateado = String(paginaActual); 
            } else if (prefijoArchivo.includes('Infernal-Hulk') || prefijoArchivo.includes('Captain-America')) {
                // Hulk y Capitán América usan 5 dígitos (00001, 00002...)
                 numeroFormateado = String(paginaActual).padStart(5, '0');
            } else if (prefijoArchivo.includes('The-Spectacular') || prefijoArchivo.includes('Nightwing')) {
                // Spiderman y Nightwing usan 4 dígitos (0001, 0002...) o variantes de 4.
                // Observando el archivo de Nightwing: "Nightwing-139-...-0001.jpg"
                numeroFormateado = String(paginaActual).padStart(4, '0');
            } else {
                // Por si acaso, un fallback estándar
                numeroFormateado = String(paginaActual);
            }
    
            // Construimos la ruta dinámica de la imagen
            const rutaFinal = `${rutaReal}/${prefijoArchivo}${numeroFormateado}.jpg`;
            console.log("Intentando cargar:", rutaFinal); 
    
            imagenImg.src = rutaFinal;
    
            // Actualizamos el contador de páginas inferior
            document.getElementById('info-pagina').innerText = `Página ${paginaActual} de ${totalPaginas}`;

            // Controlamos los estados de los botones
            document.getElementById('btn-anterior').disabled = (paginaActual === 1);
            document.getElementById('btn-siguiente').disabled = (paginaActual === totalPaginas);
        }
        
    </script>
</body>
</html>
