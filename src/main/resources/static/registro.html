<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ComicUam</title>
    <!-- Ruta absoluta para Spring Boot -->
    <link rel="stylesheet" href="/css/p1.css">
</head>
<body>

    <header class="netflix-navbar">
        <!-- Agrupamos el logo y los enlaces dentro de navbar-left como pide el CSS -->
        <div class="navbar-left">
            <div class="logo">
                <img src="/img/logo.jpeg" alt="Logo de ComicUam">
            </div>
            <!-- Cambiamos el nav por un ul directo con la clase nav-links -->
            <ul class="nav-links">
                <li><a href="/index.html">Inicio</a></li>
                <li><a href="#">Cómics</a></li>
                <li><a href="#">Novedades</a></li>
                <li><a href="#">Mi Lista</a></li>
                <li><a href="/login">Iniciar sesión</a></li>
            </ul>
        </div>
    </header>

    <!-- Usamos .main-container para centrar y dar fondo -->
    <main class="main-container" style="min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-top: 80px;">
        
        <!-- Reutilizamos .login-container para que herede la tarjeta oscura perfecta -->
        <section class="login-container">
            <h2>Registro de Nuevo Usuario</h2>
            <p>Crea una cuenta para comenzar a leer.</p>
            
            <form id="formRegistro">
                <!-- Cambiado a .input-group para que tome los estilos del CSS -->
                <div class="input-group">
                    <label for="username">Nombre de Usuario:</label>
                    <input type="text" id="username" placeholder="Tu nombre de usuario" required>
                </div>
                
                <div class="input-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Crea una contraseña" required>
                </div>
                
                <!-- Cambiado a .btn-login para que sea el botón rojo de Netflix -->
                <button type="submit" class="btn-login">Registrarse</button>
            </form>
            
            <div class="register-link">
                <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a>.</p>
            </div>
        </section>
        
    </main>

    <script>
        document.getElementById('formRegistro').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usuario = {
                nombre: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const respuesta = await fetch('/api/auth/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(usuario)
                });

                if (respuesta.ok) {
                    alert("¡Usuario registrado con éxito! Ahora inicia sesión.");
                    window.location.href = "/login";
                } else {
                    alert("Error al registrar: Posiblemente el correo ya existe.");
                }
            } catch (error) {
                alert("Error de conexión con el servidor.");
            }
        });
    </script>
</body>
</html>
