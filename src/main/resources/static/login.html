<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicUAM - Iniciar Sesión</title>

    <link rel="stylesheet" href="../static/css/login.css">
    <link rel="stylesheet" href="../static/css/p1.css">
    
    <style>
       
        .netflix-navbar {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            padding: 15px 4% !important; 
            background: rgba(0, 0, 0, 0.9) !important; 
        }

        .nav-links ul {
            display: flex !important;
            align-items: center !important;
            margin: 0 !important;
            padding: 0 !important;
            list-style: none !important;
            gap: 20px !important; 
        }

        .nav-links a {
            font-size: 1.05rem !important;
            font-weight: 500 !important;
            color: #e5e5e5 !important;
            text-decoration: none !important;
            transition: color 0.3s ease, transform 0.2s ease !important;
            display: inline-block !important;
        }

        .nav-links a:hover {
            color: #ff6600 !important;
            transform: scale(1.05);
        }

        .nav-links ul li:last-child a {
            background-color: #ff6600 !important;
            color: white !important;
            padding: 7px 17px !important;
            border-radius: 4px !important;
            font-weight: 600 !important;
            box-shadow: 0 4px 10px rgba(255, 102, 0, 0.3) !important;
            transition: background 0.2s ease, transform 0.2s ease !important;
        }

        .nav-links ul li:last-child a:hover {
            background-color: #cc5200 !important; 
            transform: translateY(-1px) !important;
            color: white !important;
        }

        .login-container {
            background: rgba(0, 0, 0, 0.8) !important;
            padding: 40px 30px !important;
            border-radius: 8px !important;
            max-width: 450px !important;
            margin: 80px auto !important; /* Centra la tarjeta elegantemente */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5) !important;
        }

        .login-container h1 {
            color: #ff6600 !important; 
            font-size: 2rem !important;
            font-weight: 700 !important;
            margin-bottom: 12px !important;
            text-align: center !important;
            letter-spacing: 0.5px !important;
        }

        .login-container p {
            color: #a0a0a0 !important;
            text-align: center !important;
            margin-bottom: 30px !important;
            font-size: 0.95rem !important;
            line-height: 1.4 !important;
        }

        .input-group {
            display: flex !important;
            flex-direction: column !important;
            margin-bottom: 20px !important;
        }

        .input-group label {
            color: #e5e5e5 !important;
            margin-bottom: 8px !important;
            font-size: 0.9rem !important;
            font-weight: 500 !important;
        }

        .input-group input {
            background: #333 !important;
            border: 1px solid #444 !important;
            border-radius: 4px !important;
            color: white !important;
            padding: 12px !important;
            font-size: 1rem !important;
            transition: border-color 0.3s ease !important;
        }

        .input-group input:focus {
            border-color: #ff6600 !important;
            outline: none !important;
        }

        .btn-login {
            width: 100% !important;
            background-color: #ff6600 !important;
            color: white !important;
            border: none !important;
            padding: 14px !important;
            border-radius: 4px !important;
            font-size: 1.05rem !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            box-shadow: 0 4px 12px rgba(255, 102, 0, 0.4) !important;
            transition: background 0.2s ease, transform 0.2s ease !important;
            margin-top: 15px !important;
        }

        .btn-login:hover {
            background-color: #cc5200 !important;
            transform: translateY(-1px) !important;
        }

        .register-link {
            margin-top: 15px !important;
            display: flex !important;
            justify-content: center !important;
        }

        .btn-register-link {
            display: block !important;
            width: 100% !important;
            text-align: center !important;
            border: 1px solid #ff6600 !important;
            background: transparent !important;
            padding: 12px !important;
            border-radius: 4px !important;
            transition: background 0.3s ease, transform 0.2s ease !important;
            text-decoration: none !important;
        }

        .btn-register-link a {
            color: #ff6600 !important;
            font-weight: 600 !important;
            font-size: 1rem !important;
            text-decoration: none !important;
            width: 100% !important;
        }

        .btn-register-link:hover {
            background: rgba(255, 102, 0, 0.1) !important;
            transform: translateY(-1px) !important;
        }

        .recuperar-contrasenia-link {
            margin-top: 25px !important;
            text-align: center !important;
            color: #a0a0a0 !important;
            font-size: 0.95rem !important;
        }

        .recuperar-contrasenia-link a {
            color: #ff6600 !important;
            text-decoration: none !important;
            font-weight: 600 !important;
            margin-left: 5px !important;
        }

        .recuperar-contrasenia-link a:hover {
            text-decoration: underline !important;
        }
    </style>
</head>

<body>

    <header class="netflix-navbar">
        <div class="logo">
            <img src="../static/img/logo.jpeg" alt="Logo de ComicUam">
        </div>
        <nav class="nav-links">
            <ul>
                <li><a href="../static/index.html">Inicio</a></li>
                <li><a href="#">Cómics</a></li>
                <li><a href="#">Novedades</a></li>
                <li><a href="#">Mi Lista</a></li>
                <li><a href="../static/login.html">Iniciar sesión</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container">

        <section class="login-container">

            <h1>Iniciar sesión</h1>

            <p>Ingresa tus datos para acceder a ComicUAM.</p>

            <form action="#" method="post">

                <div class="input-group">
                    <label for="correo">Correo electrónico</label>
                    <input
                        type="email"
                        id="correo"
                        name="correo"
                        placeholder="Ingresa tu correo"
                        required>
                </div>

                <div class="input-group">
                    <label for="contrasena">Contraseña</label>
                    <input
                        type="password"
                        id="contrasena"
                        name="contrasena"
                        placeholder="Ingresa tu contraseña"
                        required>
                </div>

                <button class="btn-login" type="submit">
                    Iniciar sesión
                </button>

            </form>

            <!-- Estructura del botón registrarme corregida y estilizada -->
            <div class="register-link">
                <a href="../register/register.html" class="btn-register-link">Registrarme</a>
            </div>

            <div class="recuperar-contrasenia-link">
                ¿No Recuerdo Mi Contraseña?
                <a href="../static/recuperar.html">Recuperar Contraseña</a>
            </div>

        </section>

    </main>

</body>

</html>
