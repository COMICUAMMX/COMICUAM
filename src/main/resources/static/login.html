<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ComicUam</title>
    <link rel="stylesheet" href="/css/p1.css">
</head>

<body>

    <header class="netflix-navbar">
        <div class="navbar-left">
            <div class="logo">
                <img src="/img/logo.jpeg" alt="Logo de ComicUam">
            </div>
            <ul class="nav-links">
                <li><a href="/index.html">Inicio</a></li>
                <li><a href="#">Cómics</a></li>
                <li><a href="#">Novedades</a></li>
                <li><a href="#">Mi Lista</a></li>
                <li><a href="/login" class="active">Iniciar sesión</a></li>
            </ul>
        </div>
    </header>

    <main class="main-container" style="min-height: 100vh; display: flex; justify-content: center; align-items: center; padding-top: 80px;">
        <section class="login-container">
            <h2>Iniciar Sesión</h2>
            <p>Introduce tus credenciales para acceder.</p>
            
            <form id="formLogin">
                <div class="input-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Tu contraseña" required>
                </div>
                
                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>
            
            <div class="register-link">
                <p>¿Nuevo en ComicUam? <a href="/registro">Regístrate ahora</a>.</p>
            </div>
        </section>
    </main>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const credenciales = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                // Apunta al nuevo endpoint que creamos en el AutenticacionControlador
                const respuesta = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(credenciales)
                });

                if (respuesta.ok) {
                    // Si el backend responde 200 OK, recuperamos el objeto usuario
                    const usuario = await respuesta.json();
                    
                    // Guardamos una sesión local básica (puedes guardar el rol o id)
                    localStorage.setItem('usuarioLogueado', JSON.stringify(usuario));
                    
                    alert("¡Bienvenido de vuelta, " + usuario.nombre + "!");
                    
                    // Aquí lo mandas a la página principal interna
                    window.location.href = "/index.html"; 
                } else {
                    // Si el backend mandó 401, entra aquí e impide el paso por completo
                    alert("Correo o contraseña incorrectos. Inténtalo de nuevo.");
                }
            } catch (error) {
                alert("Error de conexión con el servidor.");
            }
        });
    </script>
</body>
</html>
