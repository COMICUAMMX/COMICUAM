<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ComicUam</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <header class="netflix-navbar">
        <div class="logo">
            <img src="../img/logo.jpeg" alt="Logo de ComicUam">
        </div>
        <nav class="nav-links">
            <ul>
                <li><a href="../index/index.html">Inicio</a></li>
                <li><a href="#">Cómics</a></li>
                <li><a href="#">Novedades</a></li>
                <li><a href="#">Mi Lista</a></li>
                <li><a href="login.html">Iniciar sesión</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-container">
        <section class="register-section">
            <h2>Registro de Nuevo Usuario</h2>
            <form action="../php/register.php" method="POST" class="register-form">
                <div class="form-group">
                    <label for="username">Nombre de Usuario:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Registrarse</button>
            </form>
            <p>¿Ya tienes cuenta? <a href="../login/login.html">Inicia sesión aquí</a>.</p>

        </section>
    </main>
